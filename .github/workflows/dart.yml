name: iOS IPA Build

on:
  workflow_dispatch: # allows manual trigger

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7' # or your Flutter stable version

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Pre-build for iOS
        run: |
          flutter clean
          flutter precache --ios

      -name: Build IPA
  env:
    APP_STORE_CONNECT_KEY: ${{ secrets.APP_STORE_CONNECT_KEY }}
    APP_STORE_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
    APP_STORE_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
    APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
  run: |
    # Decode the base64 API key if you stored it as text
    echo "$APP_STORE_CONNECT_KEY" > AuthKey.p8

    # Build the IPA and sign it
    flutter build ipa \
      --release \
      --export-method app-store \
      --build-number 1 \
      --build-name 1.0.0 \
      --no-codesign

    # Use altool to upload or validate (optional)
    xcrun altool --upload-app \
      -f build/ios/ipa/Runner.ipa \
      -t ios \
      -u "<YOUR_APPLE_ID_EMAIL>" \
      -p "@env:APP_SPECIFIC_PASSWORD"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
